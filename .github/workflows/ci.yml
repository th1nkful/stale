name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  test-install:
    runs-on: ubuntu-latest
    name: Test install.sh on Ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Install via install.sh (default INSTALL_DIR)
        run: sh install.sh

      - name: Verify stale is installed
        run: $HOME/.local/bin/stale --version

      - name: Install via install.sh (custom INSTALL_DIR)
        env:
          INSTALL_DIR: ${{ runner.temp }}/stale-bin
        run: sh install.sh

      - name: Verify stale in custom dir
        run: |
          "${{ runner.temp }}/stale-bin/stale" --version
