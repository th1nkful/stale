name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../stale-${{ matrix.target }}.tar.gz stale
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: stale-${{ matrix.target }}
          path: stale-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4.1.7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          SHA_MACOS_X86=$(curl -fsSL "${BASE_URL}/stale-x86_64-apple-darwin.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_MACOS_ARM=$(curl -fsSL "${BASE_URL}/stale-aarch64-apple-darwin.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_X86=$(curl -fsSL "${BASE_URL}/stale-x86_64-unknown-linux-gnu.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_ARM=$(curl -fsSL "${BASE_URL}/stale-aarch64-unknown-linux-gnu.tar.gz" | shasum -a 256 | awk '{print $1}')

          cat > Formula/stale.rb << FORMULA
          class Stale < Formula
            desc "CLI tool to run or skip commands based on file content hashes"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_intel do
                url "${BASE_URL}/stale-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
              on_arm do
                url "${BASE_URL}/stale-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE_URL}/stale-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
              on_arm do
                url "${BASE_URL}/stale-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
            end

            def install
              bin.install "stale"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/stale --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/stale.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Homebrew formula for ${{ github.ref_name }}"
          title: "Update Homebrew formula for ${{ github.ref_name }}"
          body: "Automated PR to update the Homebrew formula for release ${{ github.ref_name }}."
          branch: update-formula/${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
